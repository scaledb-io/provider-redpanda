# Minimal Instance CR — smallest viable configuration.
# Single-broker Redpanda cluster (standalone topology).
apiVersion: core.openeverest.io/v1alpha1
kind: Instance
metadata:
  name: my-redpanda-simple
  namespace: everest-dev
spec:
  provider: provider-redpanda
  topology: standalone
  components:
    engine:
      replicas: 1
      resources:
        limits:
          cpu: "1"
          memory: 2Gi
      storage:
        size: 20Gi
