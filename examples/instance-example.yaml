# Full-featured Instance CR — 3-broker HA Redpanda cluster.
# Replicated topology with explicit version and storage class.
apiVersion: core.openeverest.io/v1alpha1
kind: Instance
metadata:
  name: my-redpanda
  namespace: everest-dev
spec:
  provider: provider-redpanda
  topology: replicated
  version: "25.1"
  components:
    engine:
      replicas: 3
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
      storage:
        size: 50Gi
        # storageClass: standard  # uncomment to pin a storage class
