# Component type version catalog.
# Tracks supported Redpanda releases managed by the Redpanda Operator.
# Exactly one version per type must be marked `default: true`.
#
# Images: official Redpanda Docker Hub image (docker.redpanda.com/redpandadata/redpanda).
# See: https://docs.redpanda.com/current/get-started/intro-to-events/

componentTypes:
  redpanda:
    versions:
    - version: "v25.1.8"
      image: docker.redpanda.com/redpandadata/redpanda:v25.1.8
      default: true
    - version: "v24.3.12"
      image: docker.redpanda.com/redpandadata/redpanda:v24.3.12

# Version bundles: curated sets of compatible component versions.
versions:
- name: "25.1"
  default: true
  components:
    engine: "v25.1.8"
- name: "24.3"
  components:
    engine: "v24.3.12"
