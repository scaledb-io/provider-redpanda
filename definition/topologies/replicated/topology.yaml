# Replicated topology: multi-broker Redpanda cluster.
# Redpanda uses a built-in Raft-based metadata store — no ZooKeeper required.
# Minimum 3 brokers for Raft quorum and partition replication safety.
# Suitable for production workloads requiring high availability.

config:
  components:
    engine: {}

ui:
  sections:
    redpandaVersion:
      label: "Redpanda Version"
      description: "Select the Redpanda version to deploy."
      components:
        version:
          uiType: select
          path: spec.version
          fieldParams:
            label: "Redpanda Version"
            optionsPath: spec.versions
            optionsPathConfig:
              labelPath: "name"
              valuePath: "name"
            modes:
              edit:
                disabled: true
          validation:
            required: true

    scaling:
      label: "Scaling"
      description: "Number of Redpanda brokers. Minimum 3 for HA (Raft quorum)."
      components:
        replicas:
          uiType: number
          path: spec.components.engine.replicas
          fieldParams:
            label: "Brokers"
            defaultValue: 3
            step: 1
            modes:
              edit:
                disabled: true
          validation:
            required: true
            min: 3

    resources:
      label: "Resources"
      description: "Compute resources and storage per Redpanda broker."
      components:
        compute:
          uiType: group
          groupType: line
          components:
            cpu:
              uiType: number
              path: spec.components.engine.resources.limits.cpu
              fieldParams:
                label: "CPU"
                defaultValue: 2
                step: 1
              validation:
                required: true
                min: 1
            memory:
              uiType: number
              path: spec.components.engine.resources.limits.memory
              fieldParams:
                label: "Memory"
                defaultValue: 4
                step: 1
                badge: "Gi"
                badgeToApi: true
              validation:
                required: true
                min: 2
            disk:
              uiType: number
              path: spec.components.engine.storage.size
              fieldParams:
                label: "Disk"
                defaultValue: 50
                badge: "Gi"
                badgeToApi: true
              validation:
                required: true
                int: true
                min: 10
                modes:
                  edit:
                    celExpressions:
                      - celExpr: "spec.components.engine.storage.size >= original.spec.components.engine.storage.size"
                        message: "Disk size cannot be decreased"
          componentsOrder:
            - cpu
            - memory
            - disk

    advanced:
      label: "Advanced"
      description: "Optional advanced settings."
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: "Storage class"
            displayEmpty: true
            modes:
              edit:
                disabled: true
          dataSource:
            provider: storageClasses

  sectionsOrder:
    - redpandaVersion
    - scaling
    - resources
    - advanced
