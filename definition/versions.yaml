# Component type version catalog.
# Tracks supported Apache Kafka releases managed by the Strimzi operator.
# Exactly one version per type must be marked `default: true`.
#
# Strimzi 1.0.0 supports Kafka 4.1.x and 4.2.x only (3.x and 4.0 removed).
# All images: quay.io/strimzi/kafka:1.0.0-kafka-<version>
#
# metadataVersion: the KRaft metadata version for each Kafka release.
# See: https://kafka.apache.org/documentation/#kraft_metadata_version

componentTypes:
  kafka:
    versions:
    - version: "4.2.0"
      image: quay.io/strimzi/kafka:1.0.0-kafka-4.2.0
      default: true
    - version: "4.1.2"
      image: quay.io/strimzi/kafka:1.0.0-kafka-4.1.2
    - version: "4.1.1"
      image: quay.io/strimzi/kafka:1.0.0-kafka-4.1.1

# Version bundles: curated sets of compatible component versions.
versions:
- name: "4.2"
  default: true
  components:
    engine: "4.2.0"
- name: "4.1"
  components:
    engine: "4.1.2"
